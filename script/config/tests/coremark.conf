# CoreMark: UART-centric sim (LOG_* below). Rebuild model: make verilate TEST_CONFIG=coremark
# Extra RTL logs? Stale obj_dir — rm -rf build/obj_dir && make verilate TEST_CONFIG=coremark
# Runner skips +trace_file/+log_path/+BP_LOG_DIR for test coremark (VERILATOR_FORCE_ALL_PLUSARGS=1 undoes).
MAX_CYCLES=50000000
BUILD_THREADS=auto
SIM_THREADS=16
TEST_LIST=sim/test/coremark_test_list.flist
TRACE=0
SIM_FAST=1
KONATA_TRACER=0
LOG_COMMIT=0
COMMIT_TRACER=0
LOG_BP=0
LOG_RAM=0
LOG_UART=1
SIM_UART_MONITOR=1
