# Default test/sim profile — merged with <TEST_CONFIG>.conf (see parse_test_conf.sh)
# Override on CLI: make MAX_CYCLES=... FAST_SIM=1  (takes precedence where makefile supports it)
# Shorthand keys below map to CFG_*; other UPPER_SNAKE names become Verilog +define+

# --- Simulation / make ---
MAX_CYCLES=100000
TIMEOUT=60
BUILD_THREADS=auto
SIM_THREADS=16
COMPARE=1
SPIKE=1
NO_ADDR=0
MODE=debug
TRACE=1
TRACE_FORMAT=fst
TRACE_DEPTH=99
OPT_LEVEL=-O0
FAST_SIM=0
BP_LOG=0
VERBOSE=0

# --- Spike (ISS) ---
SPIKE_ISA=rv32imc_zicsr_zicntr_zifencei
SPIKE_PRIV=m
SPIKE_PC=0x80000000
SPIKE_TRIGGERS=1
SPIKE_PMP_REGIONS=0
SPIKE_PMP_GRANULARITY=4
SPIKE_MISALIGNED=0
SPIKE_LOG_COMMITS=1
SPIKE_ENABLED=1

# --- RTL compile-time defines (truthy → +define+NAME) ---
COMMIT_TRACER=1
KONATA_TRACER=1
LOG_COMMIT=1
LOG_RAM=0
LOG_UART=0
LOG_BP=0
SIM_UART_MONITOR=0
